# Dragon AI Image - Log Rotation Configuration
# Manages log file rotation to prevent disk space issues

# Application logs
/home/*/dragon-ai-image/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 root root
    sharedscripts
    postrotate
        # Optional: Send signal to application to reopen log files
        # docker-compose -f /home/*/dragon-ai-image/docker-compose.yml kill -s HUP app
    endscript
}

# Nginx logs
/var/log/nginx/*.log {
    daily
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 `cat /var/run/nginx.pid`
        fi
    endscript
}

# MySQL logs
/var/log/mysql/*.log {
    daily
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 mysql mysql
    sharedscripts
    postrotate
        # MySQL log rotation handled by MySQL itself
    endscript
}

# Fail2Ban logs
/var/log/fail2ban.log {
    daily
    rotate 7
    compress
    delaycompress
    notifempty
    create 0640 root root
    sharedscripts
    postrotate
        /usr/lib/fail2ban/fail2ban-client set logtarget SYSLOG
    endscript
}

# System logs
/var/log/syslog
/var/log/auth.log
{
    daily
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 root root
    sharedscripts
    postrotate
        /lib/systemd/systemd-logind-ctl rotate
    endscript
}

# Docker logs
/var/lib/docker/containers/*/*.log {
    daily
    rotate 7
    compress
    delaycompress
    notifempty
    create 0640 root root
    size 100M
}
